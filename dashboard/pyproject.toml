# command-center — pytest-only project config (no runtime deps; the dashboard is Python 3
# stdlib only, like superlooper). Test import paths (lib, bin) are added to sys.path by
# tests/conftest.py, not via `pythonpath` here, so they resolve regardless of how pytest is
# invoked and relative to the repo root rather than pytest's rootdir guess.
#
# Runtime target is William's Mac (currently Python 3.9) — CI pins 3.9 too, so a stray 3.10+
# construct that would break the deployment machine fails the gate instead of shipping.
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
